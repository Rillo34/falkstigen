version: "3.9"

services:
  app:
    build: .
    container_name: falkstigen_app
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    command: ["python3", "main.py"]

  caddy:
    image: caddy:latest
    container_name: caddy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
